services:
  mysql-master:
    image: mysql:8.0
    container_name: zygarde-mysql-master
    restart: unless-stopped
    ports:
      - "${MYSQL_MASTER_PORT:-3306}:3306"
    volumes:
      - ./data/mysql-master:/var/lib/mysql
      - ./master-init.sql:/docker-entrypoint-initdb.d/01-master-init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_ROOT_HOST: "%"
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --skip-name-resolve=1
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mysql-slave:
    image: mysql:8.0
    container_name: zygarde-mysql-slave
    restart: unless-stopped
    ports:
      - "${MYSQL_SLAVE_PORT:-3307}:3306"
    volumes:
      - ./data/mysql-slave:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_ROOT_HOST: "%"
    command:
      - --server-id=2
      - --relay-log=relay-log
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --skip-name-resolve=1
      - --default-authentication-plugin=mysql_native_password
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

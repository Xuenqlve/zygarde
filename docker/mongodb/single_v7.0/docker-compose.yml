services:
  mongodb:
    image: mongo:7.0
    container_name: zygarde-mongodb-single
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./data/mongodb:/data/db
    command:
      - mongod
      - --bind_ip_all
      - --dbpath
      - /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

services:
  zk1:
    image: zookeeper:3.9
    container_name: zygarde-zk-1
    restart: unless-stopped
    ports:
      - "${ZK1_CLIENT_PORT:-2181}:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,mntr,srvr,stat,conf,isro
    volumes:
      - ./data/zk1:/data
      - ./datalog/zk1:/datalog

  zk2:
    image: zookeeper:3.9
    container_name: zygarde-zk-2
    restart: unless-stopped
    ports:
      - "${ZK2_CLIENT_PORT:-2182}:2181"
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,mntr,srvr,stat,conf,isro
    volumes:
      - ./data/zk2:/data
      - ./datalog/zk2:/datalog

  zk3:
    image: zookeeper:3.9
    container_name: zygarde-zk-3
    restart: unless-stopped
    ports:
      - "${ZK3_CLIENT_PORT:-2183}:2181"
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,mntr,srvr,stat,conf,isro
    volumes:
      - ./data/zk3:/data
      - ./datalog/zk3:/datalog
